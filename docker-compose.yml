services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecotrack-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor-data:/var/www/html/vendor
    depends_on:
      - mysql
      - redis
    networks:
      - ecotrack

  nginx:
    image: nginx:1.27-alpine
    container_name: ecotrack-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ecotrack

  mysql:
    image: mysql:8.4
    container_name: ecotrack-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ecotrack
      MYSQL_USER: ecotrack
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ecotrack

  redis:
    image: redis:7.4-alpine
    container_name: ecotrack-redis
    ports:
      - "6379:6379"
    networks:
      - ecotrack

volumes:
  mysql-data:
  vendor-data:

networks:
  ecotrack:
